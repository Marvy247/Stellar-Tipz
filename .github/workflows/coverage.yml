name: Code Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  coverage-typescript:
    name: TypeScript Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-scaffold

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend-scaffold/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript coverage
        run: npm run test:coverage

      - name: Upload TypeScript coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./frontend-scaffold/coverage/lcov.info
          flags: typescript
          name: typescript-coverage
          fail_ci_if_error: false

  coverage-rust:
    name: Rust Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate Rust coverage
        run: cargo llvm-cov --lcov --output-path lcov.info
        working-directory: contracts

      - name: Upload Rust coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./contracts/lcov.info
          flags: rust
          name: rust-coverage
          fail_ci_if_error: false
