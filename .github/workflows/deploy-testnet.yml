name: Deploy Testnet

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'contracts/**'

permissions:
  contents: write

jobs:
  deploy-testnet:
    name: Deploy Contract to Testnet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-deploy-${{ hashFiles('contracts/**/Cargo.lock') }}

      - name: Cache soroban CLI
        id: cache-soroban
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/soroban
          key: ${{ runner.os }}-soroban

      - name: Install soroban CLI
        if: steps.cache-soroban.outputs.cache-hit != 'true'
        run: cargo install --locked soroban-cli

      - name: Build optimized WASM
        run: |
          cd contracts
          cargo build --target wasm32-unknown-unknown --release
          soroban contract optimize \
            --wasm target/wasm32-unknown-unknown/release/tipz_contract.wasm

      - name: Deploy to testnet
        id: deploy
        env:
          NATIVE_TOKEN_ID: ${{ vars.NATIVE_TOKEN_ID || 'CDLZFC3SYJYDZT7K67VZ75HPJVIEUVNIXF47ZG2FB2RMQQVU2HHGCYSC' }}
        run: |
          OUTPUT=$(./scripts/deploy-testnet.sh --optimized)
          echo "Deployment output:"
          echo "$OUTPUT"
          CONTRACT_ID=$(echo "$OUTPUT" | grep "Contract ID:" | tail -1 | awk '{print $NF}')
          echo "contract_id=$CONTRACT_ID" >> $GITHUB_OUTPUT

      - name: Generate contract bindings
        run: |
          soroban contract bindings typescript \
            --id ${{ steps.deploy.outputs.contract_id }} \
            --network testnet \
            --output-dir frontend-scaffold/src/bindings || \
          echo "Warning: Binding generation failed (may not be supported in this soroban version)"

      - name: Update frontend .env with contract ID
        run: |
          echo "CONTRACT_ID=${{ steps.deploy.outputs.contract_id }}" > frontend-scaffold/.env
          echo "NATIVE_TOKEN_ID=${{ vars.NATIVE_TOKEN_ID || 'CDLZFC3SYJYDZT7K67VZ75HPJVIEUVNIXF47ZG2FB2RMQQVU2HHGCYSC' }}" >> frontend-scaffold/.env

      - name: Commit deployment artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend-scaffold/.env frontend-scaffold/src/bindings 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update contract bindings and env for testnet [skip ci]"
          git push

      - name: Store deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-artifacts
          path: |
            contracts/target/wasm32-unknown-unknown/release/*.wasm
            contracts/target/wasm32-unknown-unknown/release/*.optimized.wasm
          retention-days: 30

      - name: Verify deployment
        run: |
          echo "=== Deployment Verified ==="
          echo "Contract ID: ${{ steps.deploy.outputs.contract_id }}"
